<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="8WK PROGRAM">
<meta name="theme-color" content="#050508">
<title>8-Week Fat Loss Program</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--bg2:#0a0a10;--bg3:#0f0f18;--bd:#1a1a28;--tx:#d8d8e8;--mu:#555568;--fa:#1e1e2e;--p1:#4ade80;--p2:#facc15;--p3:#fb923c;--p4:#f87171;--cy:#22d3ee;--ck:#4ade80;--log:#3b82f6;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace;overflow:hidden;}
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s ease;}
#splash.hide{opacity:0;pointer-events:none;}
.sp-title{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:6px;color:#fff;line-height:1;text-align:center;}
.sp-sub{font-size:10px;letter-spacing:4px;color:var(--mu);margin-top:8px;}
.sp-bar{width:120px;height:2px;background:var(--fa);margin-top:32px;border-radius:2px;overflow:hidden;}
.sp-fill{height:100%;background:var(--p1);width:0;animation:spLoad 1.4s ease forwards;}
@keyframes spLoad{to{width:100%;}}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#topbar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bd);padding:10px 16px 8px;position:relative;}
.tb-phase{font-size:9px;letter-spacing:3px;margin-bottom:2px;}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#fff;}
.tb-meta{font-size:9px;color:var(--mu);letter-spacing:1px;margin-top:1px;}
.mstrip{display:flex;gap:0;margin-top:8px;overflow-x:auto;scrollbar-width:none;}
.mstrip::-webkit-scrollbar{display:none;}
.mi{flex-shrink:0;text-align:center;padding:0 10px;border-right:1px solid var(--fa);}
.mi:last-child{border-right:none;}
.ml{font-size:7px;letter-spacing:2px;color:var(--mu);display:block;}
.mv{font-size:13px;font-weight:500;display:block;margin-top:1px;}
#navtabs{flex-shrink:0;display:flex;background:var(--bg2);border-bottom:1px solid var(--bd);}
.ntab{flex:1;padding:10px 4px;text-align:center;font-size:9px;letter-spacing:2px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.ntab.active{color:#fff;}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#wkbar{display:flex;overflow-x:auto;scrollbar-width:none;padding:12px 16px;gap:8px;background:var(--bg);border-bottom:1px solid var(--bd);flex-shrink:0;}
#wkbar::-webkit-scrollbar{display:none;}
.wb{flex-shrink:0;padding:6px 14px;border-radius:2px;border:1px solid var(--bd);background:transparent;color:var(--mu);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.wb.active{color:#fff;}
#dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:12px 16px;border-bottom:1px solid var(--bd);}
.dc{border-radius:4px;border:1px solid var(--bd);padding:6px 4px;text-align:center;cursor:pointer;transition:all .15s;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.dc.active{background:#0f0f1a;}
.dc.done{border-color:var(--ck);background:#0a150a;}
.dc-name{font-size:7px;letter-spacing:1px;color:var(--mu);}
.dc-type{font-size:8px;}
.dc-prog{font-size:8px;}
#dayview{padding:0 16px 100px;}
.dh{padding:16px 0 12px;}
.dh-label{font-size:8px;letter-spacing:3px;}
.dh-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:#fff;margin-top:3px;line-height:1.1;}
.dh-time{font-size:10px;color:var(--mu);margin-top:3px;}
.pbw{height:3px;background:var(--fa);border-radius:2px;margin-top:10px;}
.pbf{height:100%;border-radius:2px;transition:width .3s ease;}
.sec{border:1px solid var(--bd);border-radius:6px;margin-bottom:12px;overflow:hidden;}
.sh{padding:10px 14px;background:var(--bg3);display:flex;justify-content:space-between;align-items:center;font-size:9px;letter-spacing:2px;cursor:pointer;}
.sh-t{flex:1;}
.sc{color:var(--mu);margin-left:8px;white-space:nowrap;}
.sb{}
.sb.col{display:none;}
.ci{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-bottom:1px solid #0c0c16;cursor:pointer;transition:background .12s;}
.ci:last-child{border-bottom:none;}
.ci.chk{background:#080f08;}
.ci:active{background:#0f0f1a;}
.cb{width:18px;height:18px;min-width:18px;border-radius:3px;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ck);flex-shrink:0;margin-top:1px;transition:all .15s;}
.chk .cb{background:#0f2010;border-color:var(--ck);}
.ct{font-size:12px;line-height:1.55;color:var(--tx);}
.chk .ct{color:var(--mu);text-decoration:line-through;}
/* LOGGING SECTION */
.log-sec{border:2px solid var(--log);border-radius:6px;margin-bottom:12px;overflow:hidden;background:#050a18;}
.log-head{padding:10px 14px;background:#070e20;display:flex;justify-content:space-between;align-items:center;font-size:9px;letter-spacing:2px;color:var(--log);}
.log-body{padding:14px;}
.log-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.log-field{display:flex;flex-direction:column;gap:4px;}
.log-label{font-size:8px;letter-spacing:2px;color:var(--mu);}
.log-input{background:var(--bg3);border:1px solid var(--bd);color:var(--tx);font-family:'DM Mono',monospace;font-size:13px;padding:8px 10px;border-radius:4px;width:100%;transition:border-color .2s;}
.log-input:focus{outline:none;border-color:var(--log);box-shadow:0 0 0 2px rgba(59,130,246,.15);}
.log-full{grid-column:1/-1;}
.log-textarea{background:var(--bg3);border:1px solid var(--bd);color:var(--tx);font-family:'DM Mono',monospace;font-size:12px;padding:8px 10px;border-radius:4px;width:100%;resize:none;min-height:70px;transition:border-color .2s;}
.log-textarea:focus{outline:none;border-color:var(--log);box-shadow:0 0 0 2px rgba(59,130,246,.15);}
.log-whiskey{display:flex;gap:8px;align-items:center;}
.wbtn{flex:1;padding:8px 6px;border:1px solid var(--bd);background:transparent;color:var(--mu);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;border-radius:4px;transition:all .15s;text-align:center;}
.wbtn.sel{border-color:var(--p3);background:rgba(251,146,60,.15);color:var(--p3);}
.wbtn.sel0{border-color:var(--p1);background:rgba(74,222,128,.15);color:var(--p1);}
.log-save-indicator{font-size:9px;color:var(--mu);letter-spacing:1px;margin-top:8px;text-align:right;transition:color .3s;}
.log-save-indicator.saved{color:var(--ck);}
.macro-bars{margin-top:10px;}
.mbar-row{margin-bottom:6px;}
.mbar-label{font-size:9px;color:var(--mu);letter-spacing:1px;margin-bottom:2px;display:flex;justify-content:space-between;}
.mbar-track{height:6px;background:var(--fa);border-radius:3px;overflow:hidden;}
.mbar-fill{height:100%;border-radius:3px;transition:width .4s ease;}
/* OVERVIEW */
#ovview{padding:16px;overflow-y:auto;}
.ov-sec{margin-bottom:24px;}
.ov-hd{font-size:9px;letter-spacing:3px;color:var(--mu);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--fa);}
.ph-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ph-card{border-radius:6px;padding:12px;border:1px solid;}
.ph-wk{font-size:8px;letter-spacing:2px;margin-bottom:3px;}
.ph-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff;}
.ph-desc{font-size:10px;color:var(--mu);margin-top:5px;line-height:1.5;}
.ph-mac{display:flex;gap:10px;margin-top:8px;font-size:10px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-hd{text-align:center;font-size:7px;letter-spacing:1px;color:var(--mu);padding:3px 0;}
.cal-c{border-radius:3px;border:1px solid var(--bd);padding:4px 2px;text-align:center;min-height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;transition:border-color .15s;}
.cal-c.done{border-color:var(--ck);background:#06100a;}
.cal-c.partial{border-color:var(--p2);}
.cal-wk{font-size:7px;color:#333;}
.cal-ty{font-size:7px;}
.cal-pc{font-size:7px;}
/* NAV */
.daynav{display:flex;justify-content:space-between;padding:16px 0 8px;}
.navb{padding:10px 20px;border-radius:4px;border:1px solid var(--bd);background:transparent;color:var(--mu);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .15s;}
.navb:active{opacity:.7;}
/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--log);color:#fff;font-size:11px;letter-spacing:2px;padding:10px 20px;border-radius:4px;z-index:500;transition:transform .3s ease;white-space:nowrap;font-family:'DM Mono',monospace;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.green{background:var(--ck);color:#000;}
</style>
</head>
<body>
<div id="splash">
  <div class="sp-title">8 WEEK<br>PROGRAM</div>
  <div class="sp-sub">FAT LOSS · MUSCLE RETENTION · LIFETIME</div>
  <div style="margin-top:20px;display:flex;gap:6px;">
    <span style="width:8px;height:8px;border-radius:50%;background:var(--p1);display:inline-block;"></span>
    <span style="width:8px;height:8px;border-radius:50%;background:var(--p2);display:inline-block;"></span>
    <span style="width:8px;height:8px;border-radius:50%;background:var(--p3);display:inline-block;"></span>
    <span style="width:8px;height:8px;border-radius:50%;background:var(--p4);display:inline-block;"></span>
  </div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

<div id="app" style="display:none">
  <div id="topbar">
    <div class="tb-phase" id="tb-phase">▸ FOUNDATION PHASE — WEEKS 1-2</div>
    <div class="tb-title">8-WEEK FAT LOSS</div>
    <div class="tb-meta">200LBS · 17.1% BF → TARGET 12–13% BF · STARTING TODAY</div>
    <div class="mstrip" id="mstrip"></div>
  </div>
  <div id="navtabs">
    <div class="ntab active" id="tab-daily" onclick="switchView('daily')">DAILY LOG</div>
    <div class="ntab" id="tab-overview" onclick="switchView('overview')">OVERVIEW</div>
  </div>
  <div id="main">
    <div id="dailyview">
      <div id="wkbar"></div>
      <div id="dgrid"></div>
      <div id="dayview"></div>
    </div>
    <div id="ovview" style="display:none"></div>
  </div>
</div>
<div id="toast">✓ SAVED</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
var S = { w:1, d:0, view:'daily', chk:{}, log:{} };

function save(){
  try{
    localStorage.setItem('flp2_chk', JSON.stringify(S.chk));
    localStorage.setItem('flp2_log', JSON.stringify(S.log));
    localStorage.setItem('flp2_w', S.w);
    localStorage.setItem('flp2_d', S.d);
  }catch(e){}
}

function load(){
  try{
    var c=localStorage.getItem('flp2_chk'); if(c) S.chk=JSON.parse(c);
    var l=localStorage.getItem('flp2_log'); if(l) S.log=JSON.parse(l);
    var w=localStorage.getItem('flp2_w'); if(w) S.w=parseInt(w);
    var d=localStorage.getItem('flp2_d'); if(d) S.d=parseInt(d);
  }catch(e){}
}

// ─── MACROS BY PHASE ─────────────────────────────────────────────────────────
var MACROS={'1-2':{cal:2200,p:220,c:175,f:65},'3-4':{cal:2200,p:225,c:160,f:65},'5-6':{cal:2100,p:225,c:145,f:62},'7-8':{cal:2000,p:230,c:125,f:58}};
function phaseKey(w){return w<=2?'1-2':w<=4?'3-4':w<=6?'5-6':'7-8';}
function phaseColor(w){return w<=2?'var(--p1)':w<=4?'var(--p2)':w<=6?'var(--p3)':'var(--p4)';}
function phaseName(w){return w<=2?'FOUNDATION':w<=4?'ACCELERATE':w<=6?'PUSH':'PEAK';}
function phaseBand(w){return w<=2?'WEEKS 1-2':w<=4?'WEEKS 3-4':w<=6?'WEEKS 5-6':'WEEKS 7-8';}
var DAYS=['MON','TUE','WED','THU','FRI','SAT','SUN'];
var DAYSFULL=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

// ─── DATES ───────────────────────────────────────────────────────────────────
var START = new Date(2026,4,4); // May 4 2026
function dayDate(w,d){
  var n=new Date(START);
  n.setDate(n.getDate()+(w-1)*7+d);
  var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return mo[n.getMonth()]+' '+n.getDate()+', 2026';
}

// ─── DAY TYPE ─────────────────────────────────────────────────────────────────
function dtype(d){if(d===2)return'rest';if(d===6)return'cardio';return'gym';}
function dtypeColor(d){var t=dtype(d);if(t==='rest')return'#818cf8';if(t==='cardio')return'#22d3ee';return'#f59e0b';}
function dtypeShort(d){return['UPPER','LOWER','REST','PUSH','PULL','LEGS','CARDIO'][d];}

// ─── CARDIO STRINGS ──────────────────────────────────────────────────────────
function cardioStr(d,ci){
  if(d===0){return ci===0?'20 min Treadmill — 2 min walk @3.5mph / 1 min jog @5.5mph, repeat':ci===1?'25 min Rower — 2 min moderate / 45 sec hard sprint, repeat':'30 min Treadmill — 90 sec walk / 60 sec jog @6mph, 1° incline added each week';}
  if(d===1){return ci===0?'15 min Rower — steady moderate pace (warm-up for legs)':ci===1?'20 min Rower — 1 min hard / 1 min easy intervals':'25 min Treadmill incline walk — 3.5–4mph at 8–10°';}
  if(d===3){return ci===0?'20 min Rower — steady state 65–70% HR':ci===1?'25 min Treadmill — 2 min walk / 1 min jog @5.5–6mph':'30 min Rower — 1 min hard / 1 min moderate, full duration';}
  if(d===4){return ci===0?'20 min Treadmill — 3.5mph walk at 5° incline':ci===1?'25 min Rower — 2 min moderate / 1 min sprint, repeat':'30 min Treadmill incline walk — 3.5mph at 10–12°';}
  if(d===5){return ci===0?'20 min Rower — steady moderate effort':ci===1?'25 min Treadmill intervals at 6° incline — 90s walk/60s jog':'30 min Rower — 1 min hard / 1 min easy, full duration';}
  return '';
}

// ─── WORKOUT ROTATIONS ───────────────────────────────────────────────────────
// MON: Upper Body Chest+Back. Rotates every 3 weeks.
var CHEST_R=[
  ['Barbell Bench Press — 4x10 @ 155lbs','Incline Dumbbell Press — 4x10 @ 50lb DBs','Cable Flyes 5° angle — 4x12 @ 30lbs each','PecDeck — 4x12 @ 100lbs'],
  ['Dumbbell Bench Press — 4x10 @ 60lb DBs','Incline Barbell Press — 3x15 @ 70lbs','Seated Chest Press Machine — 4x12 progressive: 55/65/70/75lbs','Cable Flyes 9° angle — 4x10 @ 33lbs'],
  ['Hex Dumbbell Press — 4x10 @ 55lb DBs','Decline Barbell Press — 4x12 @ 45s on bar','Seated Side Press — 4x10 @ 55lbs','Dumbbell Flyes — 3x15 @ 22.5lbs']
];
var BACK_R=[
  ['Deadlifts (Barbell) — 3x8 @ 175lbs','Bent-Over Rows — 3x10 @ 55lb DBs each','Lat Pulldown Machine — 4x10 progressive: 150/160/170/180lbs','Seated Cable Rows — 4x12 @ 160lbs','Face Pulls — 3x12 moderate weight'],
  ['Pull-Ups — 3x10 with 30lb assist','Seated Row Machine — 3x10 @ 90lbs each side','Low Rows Machine (vert handle) — 4x10 @ 70lbs es','Back Flyes Machine — 4x10 @ 70lbs','Lawnmower Pulls — 3x8 @ 70lbs each'],
  ['Bent-Over Rows (heavier) — 3x8 @ 65lb DBs','Seated Lat Pulldown Machine — 4x10 @ 90–100lbs es','Crossbody Lat Pulls Kneeling — 3x10 @ 47lbs each','Cable Crossovers Guillotine — 4x8 @ 17lbs','Shrugs — 4-set ladder: 140/180/230/270lbs']
];
// TUE: Lower Body Quad Dominant
var QUAD_R=[
  ['Window Squat Machine — pyramid: 15x140/12x160/10x180/8x200/6x220/4x240lbs','Leg Press — 4x10 @ 220–260lbs','Quad Curl (non-rocking) — 4x10 @ 175lbs','Hamstring Curls — 4x10 @ 120lbs','Hip Abduction — 4x12 @ 130–145lbs','Calf Raises (Seated) — 3x20 @ 140lbs'],
  ['Barbell Back Squats — pyramid: 15x45s/12x55s/10x65s/10x65s/12x55s/15x45s','Squat Press Machine — 4x15 @ 270lbs','Leg Press — 4x12 @ 240–280lbs','Quad Curl Rocking Machine — 4x12 @ 125lbs','Hip Adduction — 4x12 progressive: 145/150/155/160lbs','Calf Raises (Standing) — 3x30 @ 220lbs'],

];
// THU: Push — Chest+Shoulders+Triceps
var PUSH_CHEST_R=[

  ['Barbell Bench Press — 4x10 @ 155lbs','Cable Flyes 5° — 4x12 @ 30lbs','Decline Barbell Press — 4x10 @ 50s on bar'],
  ['Hex Dumbbell Press — 4x10 @ 55lb DBs','PecDeck — 4x12 @ 100lbs','Cable Flyes 9° — 2x12@30 + 2x10@33lbs']

var PUSH_SHOULDER_R=[

  ['Overhead Barbell Press — 3x10 @ 80lbs','Lateral Raises — 3x12 @ 12–15lbs','Front Raises (DB) — 3x12 @ 12lbs','Incline Leaning Lateral Raise — 3x10 @ 17.5lbs']
];
var PUSH_TRI_R=[
  ['Tricep Dips — 4x12 bodyweight','Tricep Pushdown — 4x10 @ 100lbs slow/controlled','Skullcrushers — 3x12 @ 65lbs'],
  ['Close-Grip Bench Press (EZ bar) — 4x15 @ 95lbs','Overhead Cable Extension — 3x10 @ 130–140lbs','Seated Dips Machine — 4 progressive sets: 180/230/270/320lbs'],
  ['Overhead DB Tricep Press — 4x12 @ 70lbs','Tricep Pushdown (slow) — 4x10 @ 100lbs','Overhead Cable Extension ladder — 3x8: 57.5/65/70lbs']
];
// FRI: Pull — Back+Biceps
var PULL_BACK_R=[
  ['Deadlifts (Barbell) — 3x8 @ 175lbs','Lat Pulldown Machine — 4x10 progressive: 150/160/170/180lbs','Seated Cable Rows — 4x12 @ 160lbs','Back Flyes Machine — 4x10 @ 70lbs','Face Pulls — 3x12 moderate'],
  ['Pull-Ups — 3x10 with 30lb assist','Bent-Over Rows — 3x10 @ 55lb DBs','Low Rows Machine (horiz handle) — 4x10 @ 65lbs es','Seated Lat Pulldown Machine — 4x10 @ 90lbs es','Lawnmower Pulls — 3x8 @ 70lbs'],
  ['Seated Row Machine — 3x8 @ 115lbs es','Lat Pulldown ladder — 4 sets: 150/160/170/180lbs','Crossbody Lat Pulls Kneeling — 3x10 @ 47lbs each','Cable Crossovers Guillotine — 4x8 @ 17lbs','Shrugs — ladder: 140/180/230/270lbs']
];
var PULL_BIC_R=[
  ['Barbell Bicep Curls — 4x10 @ 65lbs','Hammer Curls — 4x12 @ 35lbs','Underhand Pulldowns — 4x10 @ 140lbs'],
  ['Incline DB Curl (palms out) — 4x10 @ 35lbs','Hammer Twist Curl — 4x15 @ 22.5lbs','Regular Preacher Curl (cambered bar) — 3x10 @ 55lbs'],
  ['Bayesian Cable Curl — 4x8 @ 30lbs','Reverse Hand Barbell Curls — 3x8 @ 40lbs','Seated High Bayesian Cable Curl — 4x10 @ 17.5lbs']
];
// SAT: Legs Ham/Glute + Arms Finisher
var SAT_LEG_R=[
  ['RDLs (Barbell) — 4x10 @ 155lbs','Hamstring Curls — pyramid: 15x140/12x160/10x160/8x180/6x200lbs','Hip Thrust Machine — 3 progressive: 45s / 45s+25s / 2x45s','Hip Abduction Machine — pyramid: 15x115/12x120/10x130/8x140lbs','Hamstring Pushback Machine — 3x12 @ 185lbs','Calf Raises (Seated) — 3x20 @ 140lbs'],
  ['Squat Press Machine — 4x10 @ 360lbs','Single Leg Hamstring Curl — 4x10 @ 55lbs each','Hip Adduction Machine — progressive: 4x15@145/4x12@150/4x10@155/4x8@160','Walking Lunges — 3x12 per leg @ 24kg KB each','Seated Leg Press Jumps — 4x15 @ 50lbs','Calf Raises (Single Leg Seated) — 4x15 @ 70lbs'],
  ['Bulgarian Split Squat — 3x10 per leg @ 80lb DB / 36kg KB','Deadlifts — 3x10 @ 135lbs','Quad Curl (non-rocking) — 4x10 @ 175lbs','Hip Abduction + Adduction superset — 4x12 each @ 145lbs','Window Squat Machine — 3x12 @ 220lbs','Calf Raises (Standing) — 3x30 @ 220lbs']
];
var SAT_ARM_R=[

function preWO(){return{t:'PRE-WORKOUT — 5:15 AM',items:['Wake up — check Oura ring sleep score before getting out of bed','Drink 16oz water immediately upon waking','Jocko Creatine — 2–4 scoops (10–20g) mixed with water','Jocko Krill Oil, Vitamin D, Testosterone Optimizer, Daily Vitamin','Optional: 1 scoop Jocko Molk protein if energy is low','Drive to Life Time — arrive at gym by 5:28 AM']};}
function postWO(extras){var items=['Jocko Molk protein shake — 1–2 scoops (30–50g protein) with water immediately post-workout','Drink 16oz water post-workout','Stretch the muscles you just trained — minimum 5 minutes'];return{t:'POST-WORKOUT RECOVERY',items:items.concat(extras||[])};}
function habitSec(){return{t:'DAILY HABITS',items:['Hit 8,000+ steps — park farther at every clinic, walk between calls','Drink 80–96oz water total throughout the day (100–120oz on gym days)','Sleep target: 7–7.5 hours — in bed by 9:30–10 PM','Check Oura ring score before bed — note HRV trend','Compression sleeves on trained muscle groups tonight','Set tomorrow\'s 5:00 AM alarm before bed']};}

function buildDay(w,d){
  var m=MACROS[phaseKey(w)];
  var wMod=(w-1)%3;
  var ci=w<=2?0:w<=4?1:2;
  var cardio=cardioStr(d,ci);

  if(d===2) return buildRest(w,m);
  if(d===0) return buildMon(w,m,wMod,ci,cardio);
  if(d===1) return buildTue(w,m,wMod,ci,cardio);
  if(d===3) return buildThu(w,m,wMod,ci,cardio);
  if(d===4) return buildFri(w,m,wMod,ci,cardio);
  if(d===5) return buildSat(w,m,wMod,ci,cardio);
  if(d===6) return buildSun(w,m,ci);
}

// ─── PROGRESS ────────────────────────────────────────────────────────────────
function dayProgress(w,d){
  var day=buildDay(w,d);
  var tot=0,done=0;
  day.sections.forEach(function(sec,si){
    sec.items.forEach(function(_,ii){
      tot++;
      if(S.chk[w+'-'+d+'-'+si+'-'+ii]) done++;
    });
  });
  return tot?Math.round(done/tot*100):0;
}

function renderWkBar(){
  var wb=document.getElementById('wkbar');
  wb.innerHTML='';
  for(var w=1;w<=8;w++){
    (function(ww){
      var btn=document.createElement('button');
      btn.className='wb'+(ww===S.w?' active':'');
      btn.textContent='WK '+ww;
      var c=phaseColor(ww);
      if(ww===S.w){btn.style.borderColor=c;btn.style.color=c;btn.style.background=c+'18';}
      btn.onclick=function(){S.w=ww;S.d=0;save();render();};
      wb.appendChild(btn);
    })(w);
  }
}

function renderGrid(){
  document.getElementById('dgrid').innerHTML=DAYS.map(function(nm,i){
    var prog=dayProgress(S.w,i);
    var act=i===S.d;
    var pc=phaseColor(S.w);
    var tc=dtypeColor(i);
    var done=prog===100;
    return '<div class="dc'+(act?' active':'')+(done?' done':'')+'" onclick="selDay('+i+')" style="'+(act?'border-color:'+pc+';background:'+pc+'15':done?'border-color:var(--ck)':'')+'">'+

    '</div>';
  }).join('');
}

      '<div class="log-save-indicator" id="log-ind-'+lk+'">● ALL ENTRIES AUTO-SAVED TO PHONE</div>'+
    '</div>'+
  '</div>';

  // Nav
  html+='<div class="daynav">'+
    '<button class="navb" onclick="prevDay()">◀ PREV</button>'+
    '<span style="font-size:10px;color:var(--mu);align-self:center">DAY '+dn+'/56</span>'+
    '<button class="navb" onclick="nextDay()" style="border-color:'+pc+';color:'+pc+'">NEXT ▶</button>'+
  '</div>';

  document.getElementById('dayview').innerHTML=html;
  renderMacroBars(lk,logData,m);
}

function escHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderMacroBars(lk,logData,m){
  var el=document.getElementById('mbars-'+lk);
  if(!el)return;
  var bars=[
    {l:'CALORIES',actual:parseInt(logData.cal)||0,target:m.cal,color:'#22d3ee'},
    {l:'PROTEIN',actual:parseInt(logData.p)||0,target:m.p,color:'#4ade80'},
    {l:'CARBS',actual:parseInt(logData.c)||0,target:m.c,color:'#facc15'},
    {l:'FAT',actual:parseInt(logData.f)||0,target:m.f,color:'#fb923c'}
  ];
  el.innerHTML=bars.map(function(b){
    var pct=b.target>0?Math.min(Math.round(b.actual/b.target*100),100):0;
    var over=b.actual>b.target;
    return '<div class="mbar-row">'+
      '<div class="mbar-label"><span>'+b.l+'</span><span style="color:'+(over?'var(--p4)':b.actual>0?b.color:'var(--mu)')+'">'+
        (b.actual>0?b.actual+' / '+b.target+(over?' ⚠️':' ✓'):'—')+
      '</span></div>'+
      '<div class="mbar-track"><div class="mbar-fill" style="width:'+pct+'%;background:'+(over?'var(--p4)':b.color)+'"></div></div>'+
    '</div>';
  }).join('');
}

// ─── LOG ACTIONS ─────────────────────────────────────────────────────────────
function saveLog(lk,field,val){
  if(!S.log[lk]) S.log[lk]={};
  S.log[lk][field]=val;
  save();
  // Flash indicator
  var ind=document.getElementById('log-ind-'+lk);
  if(ind){ind.classList.add('saved');ind.textContent='✓ SAVED TO PHONE';setTimeout(function(){ind.classList.remove('saved');ind.textContent='● ALL ENTRIES AUTO-SAVED TO PHONE';},1500);}
  // Re-render macro bars on macro input change
  if(['cal','p','c','f'].indexOf(field)>=0){
    var m=MACROS[phaseKey(S.w)];
    renderMacroBars(lk,S.log[lk]||{},m);
  }
}

function logWhiskey(lk,val){
  if(!S.log[lk]) S.log[lk]={};
  S.log[lk].whiskey=val;
  save();
  renderDay(); // re-render to show advice
}

// ─── CHECKLIST ACTIONS ───────────────────────────────────────────────────────
function togChk(key,w,d){
  S.chk[key]=!S.chk[key];
  save();
  renderGrid();
  renderDay();
  var prog=dayProgress(parseInt(w),parseInt(d));
  if(prog===100) showToast('🔥 DAY COMPLETE!',true);
  else showToast('✓ SAVED',false);
}

function toggleSec(el){el.nextElementSibling.classList.toggle('col');}

function selDay(d){S.d=d;save();renderWkBar();renderGrid();renderDay();document.getElementById('main').scrollTop=0;}
function prevDay(){if(S.d>0)S.d--;else if(S.w>1){S.w--;S.d=6;}save();render();document.getElementById('main').scrollTop=0;}
function nextDay(){if(S.d<6)S.d++;else if(S.w<8){S.w++;S.d=0;}save();render();document.getElementById('main').scrollTop=0;}

function switchView(v){
  S.view=v;
  document.getElementById('dailyview').style.display=v==='daily'?'block':'none';
  document.getElementById('ovview').style.display=v==='overview'?'block':'none';
  document.getElementById('tab-daily').classList.toggle('active',v==='daily');
  document.getElementById('tab-overview').classList.toggle('active',v==='overview');
  renderTop();
  if(v==='overview') renderOverview();
}

var toastTmr;
function showToast(msg,green){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className=green?'show green':'show';
  clearTimeout(toastTmr);
  toastTmr=setTimeout(function(){t.classList.remove('show');},1500);
}

// ─── OVERVIEW ────────────────────────────────────────────────────────────────
function renderOverview(){
  var html='<div class="ov-sec">'+
    '<div class="ov-hd">PROGRAM PHASES</div>'+
    '<div class="ph-cards">'+
    [{k:'1-2',n:'FOUNDATION',c:'var(--p1)',wk:'WEEKS 1-2',cal:2200,p:220,cr:175,f:65,desc:'Establish habits, fasted cardio 20–25 min, dial in 2,200 cal macros.'},
     {k:'3-4',n:'ACCELERATE',c:'var(--p2)',wk:'WEEKS 3-4',cal:2200,p:225,cr:160,f:65,desc:'Cardio to 25–30 min. Carbs drop 15g. Add sauna protocol post-workout.'},
     {k:'5-6',n:'PUSH',c:'var(--p3)',wk:'WEEKS 5-6',cal:2100,p:225,cr:145,f:62,desc:'Drop to 2,100 cal. 30 min cardio every gym day. Treadmill incline increases.'},
     {k:'7-8',n:'PEAK',c:'var(--p4)',wk:'WEEKS 7-8',cal:2000,p:230,cr:125,f:58,desc:'Maximum deficit. Maintain all lifts. Cold plunge + sauna 3x/week.'}
    ].map(function(ph){
      return '<div class="ph-card" style="border-color:'+ph.c+'44;background:'+ph.c+'08">'+
        '<div class="ph-wk" style="color:'+ph.c+'">'+ph.wk+'</div>'+
        '<div class="ph-name">'+ph.n+'</div>'+
        '<div class="ph-desc">'+ph.desc+'</div>'+
        '<div class="ph-mac"><span style="color:'+ph.c+'">'+ph.cal+'cal</span><span style="color:var(--mu)">'+ph.p+'P</span><span style="color:var(--mu)">'+ph.cr+'C</span><span style="color:var(--mu)">'+ph.f+'F</span></div>'+
      '</div>';
    }).join('')+
    '</div>'+
  '</div>';

  // Weekly split
  html+='<div class="ov-sec"><div class="ov-hd">WEEKLY SPLIT</div>'+
    [['MON','UPPER BODY — Chest + Back','#f59e0b'],
     ['TUE','LOWER BODY — Quad Dominant','#f59e0b'],
     ['WED','FULL REST — Active Recovery','#818cf8'],
     ['THU','PUSH — Chest + Shoulders + Triceps','#f59e0b'],
     ['FRI','PULL — Back + Biceps','#f59e0b'],
     ['SAT','LEGS (Ham/Glute) + Arms Finisher','#f59e0b'],
     ['SUN','ACTIVE RECOVERY — Cardio + Core','#22d3ee']
    ].map(function(x){
      return '<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--fa);align-items:center;">'+
        '<span style="font-size:9px;letter-spacing:2px;color:'+x[2]+';min-width:35px">'+x[0]+'</span>'+
        '<span style="font-size:11px;color:var(--tx)">'+x[1]+'</span>'+
      '</div>';
    }).join('')+
  '</div>';

  // Progress summary
  var totalDays=56,completedDays=0,totalTasks=0,completedTasks=0;
  for(var ww=1;ww<=8;ww++){for(var dd=0;dd<=6;dd++){var p=dayProgress(ww,dd);if(p===100)completedDays++;totalTasks++;if(p>0)completedTasks++;}}
  
  // Weekly progress with whiskey count
  html+='<div class="ov-sec"><div class="ov-hd">56-DAY PROGRESS CALENDAR</div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;">'+
    DAYS.map(function(d){return'<div class="cal-hd">'+d+'</div>';}).join('')+
    '</div>'+
    '<div class="cal-grid">'+
    (function(){
      var cells='';
      for(var ww=1;ww<=8;ww++){
        for(var dd=0;dd<=6;dd++){
          var pr=dayProgress(ww,dd);
          var pc=phaseColor(ww);
          var tc=dtypeColor(dd);
          var done=pr===100,partial=pr>0&&pr<100;
          cells+='<div class="cal-c'+(done?' done':partial?' partial':'')+'" onclick="navToDay('+ww+','+dd+')" style="'+(done?'':'border-color:var(--bd)')+'">'+
            '<div class="cal-wk" style="color:'+pc+'33">W'+ww+'</div>'+
            '<div class="cal-ty" style="color:'+tc+'">'+dtypeShort(dd).slice(0,4)+'</div>'+
            (pr>0?'<div class="cal-pc" style="color:'+(done?'var(--ck)':pc)+'">'+pr+'%</div>':'')+
          '</div>';
        }
      }
      return cells;
    })()+
    '</div>'+
    '<div style="display:flex;gap:14px;margin-top:10px;font-size:10px;color:var(--mu)">'+
      '<span><span style="color:#f59e0b">◆</span> Gym</span>'+
      '<span><span style="color:#818cf8">◈</span> Rest</span>'+
      '<span><span style="color:#22d3ee">◉</span> Cardio</span>'+
      '<span><span style="color:var(--ck)">✓</span> Done</span>'+
    '</div>'+
  '</div>';

  // Whiskey log summary
  html+='<div class="ov-sec"><div class="ov-hd">WHISKEY LOG — ALL 8 WEEKS</div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;">'+
    (function(){
      var cells='';
      for(var ww=1;ww<=8;ww++){
        var wTotal=0,wDays=0;
        for(var dd=0;dd<=6;dd++){
          var lk=ww+'-'+dd;
          var ld=S.log[lk]||{};
          if(ld.whiskey&&ld.whiskey!=='none'){
            wTotal+=ld.whiskey==='1'?1:ld.whiskey==='2'?2:3;
            wDays++;
          }
        }
        var pc=phaseColor(ww);
        cells+='<div style="border:1px solid var(--bd);border-radius:4px;padding:10px 8px;text-align:center;">'+
          '<div style="font-size:8px;letter-spacing:1px;color:var(--mu);">WEEK '+ww+'</div>'+
          '<div style="font-size:18px;font-weight:bold;color:'+(wTotal>4?'var(--p4)':wTotal>2?'var(--p3)':wTotal>0?'var(--p2)':pc)+'">'+wTotal+'</div>'+
          '<div style="font-size:8px;color:var(--mu);">glasses</div>'+
        '</div>';
      }
      return cells;
    })()+
    '</div>'+
    '<div style="font-size:10px;color:var(--mu);margin-top:8px;">Target: ≤8 glasses/week (1–2 nights). Each glass = ~200 cal.</div>'+
  '</div>';

  // Weight log
  html+='<div class="ov-sec"><div class="ov-hd">WEEKLY WEIGHT LOG (SUNDAY FASTED)</div>'+
    '<div style="display:flex;flex-direction:column;gap:4px;">'+
    (function(){
      var rows='';
      for(var ww=1;ww<=8;ww++){
        var lk=ww+'-6'; // Sunday
        var ld=S.log[lk]||{};
        var pc=phaseColor(ww);
        rows+='<div style="display:flex;justify-content:space-between;padding:8px 10px;border:1px solid var(--bd);border-radius:4px;align-items:center;">'+
          '<div style="font-size:10px;color:'+pc+'">WEEK '+ww+'</div>'+
          '<div style="font-size:13px;color:'+(ld.bw?'var(--tx)':'var(--mu)')+'">'+
            (ld.bw?ld.bw+' lbs':'—')+
          '</div>'+
          '<div style="font-size:10px;color:var(--mu)">'+
            (ld.bf?ld.bf+'% BF':'—')+
          '</div>'+
        '</div>';
      }
      return rows;
    })()+
  '</div></div>';

  document.getElementById('ovview').innerHTML=html;
}

function navToDay(w,d){S.w=w;S.d=d;switchView('daily');document.getElementById('main').scrollTop=0;}

window.addEventListener('DOMContentLoaded',function(){
  load();
  setTimeout(function(){
    document.getElementById('splash').classList.add('hide');
    document.getElementById('app').style.display='flex';
    render();
  },1500);
});
